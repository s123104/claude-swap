name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      # Surface a platform failure on every OS rather than cancelling siblings.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups --locked

      # Lint/format/type/audit are platform-independent — run them once on Linux.
      - name: Ruff lint
        if: runner.os == 'Linux'
        run: uv run ruff check src/ tests/

      - name: Mypy type check
        if: runner.os == 'Linux'
        run: uv run mypy --strict src/claude_swap

      - name: Mypy type check (win32 platform branches)
        # sys.platform == "win32" branches (msvcrt, ctypes, OEM decode) are
        # dead code to the default run above; re-check the modules carrying
        # them under win32 analysis. POSIX-only modules (launchd,
        # macos_keychain) fail win32 analysis by construction and stay
        # covered by the default run.
        if: runner.os == 'Linux'
        run: >-
          uv run mypy --strict --platform win32
          src/claude_swap/cli.py
          src/claude_swap/locking.py
          src/claude_swap/models.py
          src/claude_swap/printer.py
          src/claude_swap/process_detection.py
          src/claude_swap/service_spec.py
          src/claude_swap/session.py
          src/claude_swap/service_backends/systemd.py
          src/claude_swap/service_backends/task_scheduler.py

      - name: Supply-chain audit
        # OSV-backed CVE scan; https://github.com/pypa/pip-audit
        if: runner.os == 'Linux'
        run: uvx pip-audit .

      - name: Run tests with coverage floor (Linux)
        # Coverage is platform-independent, so the floor is enforced once.
        if: runner.os == 'Linux'
        run: |
          uv run pytest -q -p no:cacheprovider \
            --cov=src/claude_swap \
            --cov-report=term-missing \
            --cov-fail-under=85

      - name: Run tests (macOS)
        # The real-keychain files have their own job with hang protection.
        if: runner.os == 'macOS'
        run: |
          uv run pytest -q -p no:cacheprovider \
            --ignore=tests/test_macos_keychain.py \
            --ignore=tests/test_macos_keychain_contract.py

      - name: Redirected --list smoke (POSIX C locale)
        # LC_ALL=C is the non-UTF-8 worst case for a redirected stream; the
        # fresh runner has no accounts, so the no-account path must exit 0
        # and the redirect must carry the guidance text — never a
        # UnicodeEncodeError traceback (test matrix L-3).
        if: runner.os == 'Linux'
        run: |
          LC_ALL=C uv run cswap --list > out.txt 2>&1
          cat out.txt
          if grep -q "UnicodeEncodeError" out.txt; then exit 1; fi
          grep -q "No accounts are managed yet." out.txt

  test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # Single pip invocation so a failure fails the step regardless of the
        # default Windows shell (pwsh only checks the last command's exit code).
        run: pip install -e . pytest

      - name: Run tests
        # curses ships with CPython on Linux/macOS but not on stock Windows, so
        # the TUI tests skip here (they run on the Ubuntu job). Everything else
        # — the cross-platform CLI, session, and process-detection paths — must
        # pass, which is what catches Windows-only regressions.
        run: pytest

      - name: OEM codepage decode smoke
        # Under an OEM console codepage (cp850 here), PowerShell emits bytes
        # like 0x81 ('ü') that the ANSI codepage leaves undefined — the
        # strict-decode crash this run_service_command path guards against.
        # errors="replace" makes UnicodeDecodeError impossible by
        # construction, so what this proves is that the "oem" codec resolves
        # on a real Windows and the rc/stderr pipeline survives such bytes:
        # the content assertion accepts 'ü' (0x81 under cp437/cp850) or
        # U+FFFD (an OEM codepage where 0x81 is undefined), and anything
        # else — like an empty stderr — fails the step.
        shell: cmd
        run: chcp 850 & python -c "from claude_swap.service_spec import run_service_command; p = run_service_command(['powershell', '-NoProfile', '-Command', '[Console]::Error.WriteLine([char]252); exit 3'], check=False); assert p.returncode == 3, (p.returncode, p.stdout, p.stderr); assert '\u00fc' in p.stderr or '\ufffd' in p.stderr, repr(p.stderr); print('decoded stderr:', repr(p.stderr))"

      - name: Redirected --list smoke (cp950 console)
        # chcp only moves the console codepage — the ANSI codepage a
        # redirected stream encodes with would need a system locale change,
        # which is out of a runner's reach — but it still runs the CLI under
        # a CJK console CP on real Windows. The fresh runner has no
        # accounts, so the no-account path must exit 0 and the redirect
        # must carry the guidance text, never a UnicodeEncodeError
        # traceback (test matrix W-4).
        shell: cmd
        run: |
          chcp 950 & cswap --list > out.txt 2>&1
          if %errorlevel% neq 0 exit /b 1
          type out.txt
          findstr /C:"UnicodeEncodeError" out.txt && exit /b 1
          findstr /C:"No accounts are managed yet." out.txt

  windows-task-scheduler:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e . pytest

      - name: Task Scheduler registration round-trip
        # Registers the production task XML under a run-unique name, asserts
        # Get-ScheduledTask reports it loaded, then uninstalls. No
        # Start-ScheduledTask — registration acceptance is the thing under
        # test (XML schema, version stamp, argv quoting), not the monitor.
        env:
          CSWAP_TASK_SCHEDULER_INTEGRATION: '1'
        run: pytest tests/service_backends/test_task_scheduler_integration.py -v -m windows_service_integration

      - name: Production install + start liveness smoke
        # The round-trip above never starts the task; this runs the real
        # production path — `cswap service install` registers and
        # Start-ScheduledTasks the engine — and asserts Task Scheduler saw
        # it launch: 267009 (0x41301) = task still running, 0 = last run
        # exited cleanly. Anything else (267011 = never ran, or an engine
        # exit code) fails the job.
        shell: pwsh
        run: |
          cswap service install
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Start-Sleep -Seconds 15
          $result = (Get-ScheduledTaskInfo -TaskName "cswap-monitor").LastTaskResult
          cswap service uninstall
          if ($result -notin 0, 267009) {
            Write-Error "engine did not run cleanly: LastTaskResult=$result"
            exit 1
          }

      - name: Sweep any leftover CI task
        # Backstop for a crashed pytest process; the test's own try/finally
        # covers ordinary assertion failures.
        if: always()
        shell: pwsh
        run: |
          $name = "cswap-monitor-ci-$env:GITHUB_RUN_ID"
          Stop-ScheduledTask -TaskName $name -ErrorAction SilentlyContinue
          Unregister-ScheduledTask -TaskName $name -Confirm:$false -ErrorAction SilentlyContinue
          Stop-ScheduledTask -TaskName cswap-monitor -ErrorAction SilentlyContinue
          Unregister-ScheduledTask -TaskName cswap-monitor -Confirm:$false -ErrorAction SilentlyContinue
          exit 0

  linux-systemd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .

      - name: systemd --user install/active/uninstall round-trip
        # The unit tests fake every systemctl call; this proves the real
        # per-user manager accepts the generated unit (daemon-reload parses
        # it — the %-specifier class of bug), actually starts the engine,
        # and that uninstall stops it again.
        run: |
          systemctl --user is-system-running || true
          cswap service install
          sleep 5
          systemctl --user is-active cswap-monitor.service
          cswap service status
          cswap service uninstall
          ! systemctl --user is-active --quiet cswap-monitor.service

  macos-keychain:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Run macOS Keychain tests (contract + real security wrapper)
        # faulthandler dumps every thread's stack if a test exceeds 60s — a
        # `security` call blocking on an invisible SecurityAgent dialog would
        # otherwise hang the job with no clue where. The step timeout is the
        # backstop that actually kills it.
        timeout-minutes: 5
        run: uv run pytest tests/test_macos_keychain_contract.py tests/test_macos_keychain.py -v -o faulthandler_timeout=60
