name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run tests
        run: pytest

  test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # Single pip invocation so a failure fails the step regardless of the
        # default Windows shell (pwsh only checks the last command's exit code).
        run: pip install -e . pytest

      - name: Run tests
        # curses ships with CPython on Linux/macOS but not on stock Windows, so
        # the TUI tests skip here (they run on the Ubuntu job). Everything else
        # — the cross-platform CLI, session, and process-detection paths — must
        # pass, which is what catches Windows-only regressions.
        run: pytest

  macos-keychain:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run macOS Keychain tests (contract + real security wrapper)
        # faulthandler dumps every thread's stack if a test exceeds 60s — a
        # `security` call blocking on an invisible SecurityAgent dialog would
        # otherwise hang the job with no clue where. The step timeout is the
        # backstop that actually kills it.
        timeout-minutes: 5
        run: pytest tests/test_macos_keychain_contract.py tests/test_macos_keychain.py -v -o faulthandler_timeout=60
